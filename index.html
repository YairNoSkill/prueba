<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="./css/estilo.css">
</head>

<body>
    <div class="container">
        <section id="login-view" class="view active">
            <h2>Iniciar Sesión</h2>
            <form id="login-form">
                <input type="text" id="login-username" placeholder="Usuario (ej. admin)" required>
                <input type="password" id="login-password" placeholder="Contraseña " required>
                <button type="submit">Ingresar</button>
                <p id="login-error" class="error-msg"></p>
            </form>
        </section>

        <section id="dashboard-view" class="view hidden">
            <header class="dashboard-header">
                <h2 id="user-greeting">Bienvenido</h2>
                <button id="btn-logout" class="btn-danger">Cerrar Sesión</button>
            </header>

            <div class="form-container">
                <h3>Nueva Tarea</h3>
                <form id="task-form">
                    <input type="text" id="task-title" placeholder="Título de la tarea" required>
                    <label for="task-date">Fecha de vencimiento:</label>
                    <input type="date" id="task-date" required>
                    <label for="task-user-select" class="hidden">Asignar a:</label>
                    <select id="task-user-select" class="hidden"></select>
                    <button type="submit">Crear Tarea</button>
                    <p id="task-error" class="error-msg"></p>
                </form>
            </div>
            <div id="user-form-container" class="form-container hidden">
                <h3>Crear Nuevo Usuario</h3>
                <form id="new-user-form">
                    <input type="text" id="new-username" placeholder="Nombre de usuario" required>
                    <input type="password" id="new-password" placeholder="Contraseña" required>
                    <label for="new-role">Seleccionar Rol:</label>
                    <select id="new-role" required>
                        <option value="Usuario_Normal">Usuario Normal</option>
                        <option value="Administrador">Administrador</option>
                    </select>
                    <button type="submit">Crear Usuario</button>
                    <p id="new-user-error" class="error-msg"></p>
                    <p id="new-user-success" style="color: var(--success); font-size: 0.9em; margin-top: -10px;"></p>
                </form>
            </div>

            <div id="admin-filters" class="hidden" style="margin-bottom: 15px;">
                <label for="filter-user">Filtrar tareas por usuario:</label>
                <select id="filter-user" style="width: 100%; max-width: 300px;">
                    <option value="todos">Todos los usuarios</option>
                </select>
            </div>

            <div class="tasks-container">
                <h3>Mis Tareas</h3>
                <div id="task-list" class="task-grid"></div>
            </div>
        </section>
    </div>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
